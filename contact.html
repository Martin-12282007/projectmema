<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111317;
      color: #f5f3eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 88px 20px 32px;
      background:
        radial-gradient(circle at 14% 18%, rgba(255, 126, 95, 0.3), transparent 32%),
        radial-gradient(circle at 80% 18%, rgba(245, 214, 92, 0.22), transparent 34%),
        radial-gradient(circle at 70% 82%, rgba(88, 196, 175, 0.28), transparent 38%),
        linear-gradient(135deg, #101114 0%, #1a1f24 58%, #101114 100%);
    }

    nav {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(17, 19, 23, 0.72);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(18px);
      z-index: 2;
    }

    nav a {
      min-width: 82px;
      padding: 10px 14px;
      border-radius: 6px;
      color: #d8d3c8;
      font-size: 0.88rem;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      transition: background 180ms ease, color 180ms ease, transform 180ms ease;
    }

    nav a:hover,
    nav a[aria-current="page"] {
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      transform: translateY(-1px);
    }

    main {
      width: min(92vw, 820px);
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: clamp(24px, 5vw, 46px);
      padding: clamp(34px, 6vw, 70px);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(17, 19, 23, 0.68);
      box-shadow: 0 32px 90px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(22px);
      position: relative;
      isolation: isolate;
    }

    main::before {
      content: "";
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 6px;
      pointer-events: none;
      z-index: -1;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: #ff7e5f;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.2rem, 8vw, 6.8rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0 10px 32px rgba(0, 0, 0, 0.36);
    }

    h1 span {
      color: #ffd166;
    }

    p {
      margin: 24px 0 0;
      color: #d8d3c8;
      font-size: clamp(1rem, 2vw, 1.15rem);
      line-height: 1.7;
    }

    form {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    label {
      display: grid;
      gap: 8px;
      color: #f5f3eb;
      font-size: 0.9rem;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 13px 14px;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font: inherit;
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease;
    }

    textarea {
      min-height: 132px;
      resize: vertical;
    }

    input:focus,
    textarea:focus {
      border-color: #58c4af;
      box-shadow: 0 0 0 4px rgba(88, 196, 175, 0.16);
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      padding: 0 18px;
      background: linear-gradient(135deg, #ff7e5f, #ffd166);
      color: #16130f;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 180ms ease, filter 180ms ease;
    }

    button:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    @media (max-width: 720px) {
      body {
        align-items: flex-start;
      }

      nav {
        width: calc(100% - 32px);
      }

      nav a {
        min-width: 0;
        flex: 1;
      }

      main {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <nav aria-label="Primary navigation">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html" aria-current="page">Contact</a>
  </nav>

  <main>
    <section>
      <p class="eyebrow">Contact us</p>
      <h1>Say <span>hello.</span></h1>
      <p>Use this polished little form as a front door for questions, ideas, and future messages. It is styled and ready for a real backend whenever you want one.</p>
    </section>

    <form>
      <label>
        Name
        <input type="text" name="name" placeholder="Your name">
      </label>
      <label>
        Email
        <input type="email" name="email" placeholder="you@example.com">
      </label>
      <label>
        Message
        <textarea name="message" placeholder="Write your message here"></textarea>
      </label>
      <button type="button">Send Message</button>
    </form>
  </main>
</body>
</html>
