<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111317;
      color: #f5f3eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 88px 20px 32px;
      background:
        radial-gradient(circle at 16% 18%, rgba(245, 214, 92, 0.24), transparent 32%),
        radial-gradient(circle at 82% 20%, rgba(88, 196, 175, 0.28), transparent 34%),
        radial-gradient(circle at 70% 86%, rgba(255, 126, 95, 0.26), transparent 38%),
        linear-gradient(135deg, #101114 0%, #1a1f24 58%, #101114 100%);
    }

    nav {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: rgba(17, 19, 23, 0.72);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(18px);
      z-index: 2;
    }

    nav a {
      min-width: 82px;
      padding: 10px 14px;
      border-radius: 6px;
      color: #d8d3c8;
      font-size: 0.88rem;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      transition: background 180ms ease, color 180ms ease, transform 180ms ease;
    }

    nav a:hover,
    nav a[aria-current="page"] {
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      transform: translateY(-1px);
    }

    main {
      width: min(94vw, 980px);
      padding: clamp(32px, 5vw, 64px);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(17, 19, 23, 0.68);
      box-shadow: 0 32px 90px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(22px);
      position: relative;
      isolation: isolate;
    }

    main::before {
      content: "";
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 6px;
      pointer-events: none;
      z-index: -1;
    }

    .eyebrow {
      margin: 0 0 16px;
      color: #58c4af;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(3.3rem, 8vw, 7rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0 10px 32px rgba(0, 0, 0, 0.36);
    }

    h1 span {
      color: #ff7e5f;
    }

    .intro {
      max-width: 640px;
      margin: 22px 0 0;
      color: #d8d3c8;
      font-size: clamp(1rem, 2vw, 1.15rem);
      line-height: 1.7;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 34px;
    }

    .tile {
      min-height: 180px;
      display: flex;
      align-items: flex-end;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, rgba(255, 126, 95, 0.9), rgba(255, 209, 102, 0.8));
      box-shadow: inset 0 -80px 90px rgba(0, 0, 0, 0.28);
    }

    .tile::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.22), transparent 36%),
        radial-gradient(circle at 78% 22%, rgba(255, 255, 255, 0.34), transparent 18%);
      opacity: 0.95;
    }

    .tile:nth-child(2) {
      background: linear-gradient(135deg, rgba(88, 196, 175, 0.9), rgba(50, 86, 116, 0.82));
    }

    .tile:nth-child(3) {
      background: linear-gradient(135deg, rgba(245, 214, 92, 0.92), rgba(255, 126, 95, 0.74));
    }

    .tile:nth-child(4) {
      background: linear-gradient(135deg, rgba(86, 112, 180, 0.9), rgba(88, 196, 175, 0.74));
    }

    .tile:nth-child(5) {
      background: linear-gradient(135deg, rgba(255, 126, 95, 0.82), rgba(70, 64, 96, 0.9));
    }

    .tile:nth-child(6) {
      background: linear-gradient(135deg, rgba(88, 196, 175, 0.84), rgba(255, 209, 102, 0.78));
    }

    .tile span {
      position: relative;
      color: #ffffff;
      font-size: 1.02rem;
      font-weight: 800;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.45);
    }

    @media (max-width: 760px) {
      body {
        align-items: flex-start;
      }

      nav {
        width: calc(100% - 32px);
      }

      nav a {
        min-width: 0;
        flex: 1;
        padding-inline: 8px;
      }

      .gallery {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <nav aria-label="Primary navigation">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="gallery.html" aria-current="page">Gallery</a>
    <a href="contact.html">Contact</a>
  </nav>

  <main>
    <p class="eyebrow">Gallery</p>
    <h1>A little wall of <span>moments.</span></h1>
    <p class="intro">A fancy placeholder gallery with luminous color panels, ready to swap in real photos whenever the collection grows.</p>

    <section class="gallery" aria-label="Featured gallery items">
      <div class="tile"><span>Golden Start</span></div>
      <div class="tile"><span>Sea Glass</span></div>
      <div class="tile"><span>Warm Signal</span></div>
      <div class="tile"><span>Evening Pulse</span></div>
      <div class="tile"><span>Soft Ember</span></div>
      <div class="tile"><span>Bright Drift</span></div>
    </section>
  </main>
</body>
</html>
