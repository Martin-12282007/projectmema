<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111317;
      color: #f5f3eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 20%, rgba(255, 126, 95, 0.34), transparent 32%),
        radial-gradient(circle at 82% 16%, rgba(88, 196, 175, 0.28), transparent 34%),
        radial-gradient(circle at 70% 84%, rgba(245, 214, 92, 0.18), transparent 38%),
        linear-gradient(135deg, #101114 0%, #1a1f24 58%, #101114 100%);
    }

    main {
      width: min(92vw, 760px);
      padding: clamp(36px, 7vw, 76px);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(17, 19, 23, 0.66);
      box-shadow: 0 32px 90px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(22px);
      text-align: center;
      position: relative;
      isolation: isolate;
    }

    main::before {
      content: "";
      position: absolute;
      inset: 16px;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 6px;
      pointer-events: none;
      z-index: -1;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: #58c4af;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(4rem, 13vw, 8.8rem);
      line-height: 0.88;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0 10px 32px rgba(0, 0, 0, 0.36);
    }

    h1 span {
      display: block;
      color: #ffd166;
    }

    p {
      width: min(100%, 560px);
      margin: 26px auto 0;
      color: #d8d3c8;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      line-height: 1.7;
    }

    .sparkline {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 34px;
    }

    .sparkline i {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ff7e5f;
      box-shadow: 0 0 22px rgba(255, 126, 95, 0.7);
      animation: float 1.7s ease-in-out infinite;
    }

    .sparkline i:nth-child(2) {
      background: #ffd166;
      animation-delay: 0.16s;
      box-shadow: 0 0 22px rgba(255, 209, 102, 0.68);
    }

    .sparkline i:nth-child(3) {
      background: #58c4af;
      animation-delay: 0.32s;
      box-shadow: 0 0 22px rgba(88, 196, 175, 0.68);
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.72;
      }

      50% {
        transform: translateY(-10px);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">A tiny page with a little ceremony</p>
    <h1>Hello <span>World</span></h1>
    <p>Welcome to a brighter first file: crisp glass, warm color, and a greeting dressed up for the occasion.</p>
    <div class="sparkline" aria-hidden="true">
      <i></i>
      <i></i>
      <i></i>
    </div>
  </main>
</body>
</html>
